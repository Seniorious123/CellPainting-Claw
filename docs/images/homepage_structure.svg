<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CellPainting-Claw project structure</title>
  <desc id="desc">A three-layer pyramid showing OpenClaw at the top, cellpainting_skills in the middle, and foundation packages at the bottom, with short capability notes on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f7f3ea"/>
    </linearGradient>
    <linearGradient id="topFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4d7ba"/>
      <stop offset="100%" stop-color="#e6b98d"/>
    </linearGradient>
    <linearGradient id="midFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7e8e1"/>
      <stop offset="100%" stop-color="#b6d1c6"/>
    </linearGradient>
    <linearGradient id="baseFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9e2f0"/>
      <stop offset="100%" stop-color="#b8c7df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #1e2430; }
      .subtitle { font: 500 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #556072; }
      .layerLabel { font: 700 20px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #39414f; }
      .layerName { font: 700 26px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #1f2735; }
      .layerText { font: 500 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #324052; }
      .noteTitle { font: 700 22px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #222b38; }
      .noteText { font: 500 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #49566a; }
      .pkgText { font: 600 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #2c3950; }
      .small { font: 500 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #5f6b7c; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="url(#bg)"/>

  <text x="80" y="78" class="title">CellPainting-Claw Structure</text>
  <text x="80" y="112" class="subtitle">One foundation layer, one shared skill layer, one natural-language access layer.</text>

  <g filter="url(#shadow)">
    <polygon points="420,200 560,200 490,120" fill="url(#topFill)" stroke="#8a6a4c" stroke-width="2"/>
    <polygon points="350,330 630,330 560,200 420,200" fill="url(#midFill)" stroke="#6c8f83" stroke-width="2"/>
    <polygon points="250,520 730,520 630,330 350,330" fill="url(#baseFill)" stroke="#7187ab" stroke-width="2"/>
  </g>

  <text x="110" y="170" class="layerLabel">Layer 3</text>
  <text x="110" y="310" class="layerLabel">Layer 2</text>
  <text x="110" y="500" class="layerLabel">Layer 1</text>

  <text x="490" y="176" text-anchor="middle" class="layerName">OpenClaw</text>

  <text x="490" y="276" text-anchor="middle" class="layerName">cellpainting_skills</text>
  <text x="490" y="308" text-anchor="middle" class="layerText">Shared skill catalog</text>

  <text x="490" y="398" text-anchor="middle" class="layerName">Foundation packages</text>
  <text x="490" y="438" text-anchor="middle" class="pkgText">boto3   quilt3   cpgdata</text>
  <text x="490" y="468" text-anchor="middle" class="pkgText">CellProfiler   pycytominer</text>
  <text x="490" y="498" text-anchor="middle" class="pkgText">DeepProfiler</text>

  <line x1="760" y1="160" x2="890" y2="160" stroke="#c77f4a" stroke-width="2.5"/>
  <circle cx="760" cy="160" r="5" fill="#c77f4a"/>
  <text x="910" y="150" class="noteTitle">Natural-language access</text>
  <text x="910" y="182" class="noteText">- accept prompts</text>
  <text x="910" y="212" class="noteText">- route requests to skills</text>
  <text x="910" y="242" class="noteText">- return results</text>

  <line x1="760" y1="280" x2="890" y2="280" stroke="#5d8f7d" stroke-width="2.5"/>
  <circle cx="760" cy="280" r="5" fill="#5d8f7d"/>
  <text x="910" y="270" class="noteTitle">Skill-driven interface</text>
  <text x="910" y="302" class="noteText">- direct human use</text>
  <text x="910" y="332" class="noteText">- shared task layer for agents</text>
  <text x="910" y="362" class="noteText">- segmentation, profiling, DeepProfiler</text>

  <line x1="760" y1="446" x2="890" y2="446" stroke="#5d79a8" stroke-width="2.5"/>
  <circle cx="760" cy="446" r="5" fill="#5d79a8"/>
  <text x="910" y="436" class="noteTitle">Underlying capabilities</text>
  <text x="910" y="468" class="noteText">- data access</text>
  <text x="910" y="498" class="noteText">- classical processing</text>
  <text x="910" y="528" class="noteText">- deep feature extraction</text>

  <text x="80" y="640" class="small">Humans can use the skills directly. Agents can use the same skills through OpenClaw.</text>
  <text x="80" y="668" class="small">The lower-level cellpainting_claw package remains available for advanced direct package use.</text>
</svg>
